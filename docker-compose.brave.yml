version: '3.8'

services:
  brave:
    image: mcp/brave-search:latest
    environment:
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - BRAVE_MCP_TRANSPORT=http
      - BRAVE_MCP_PORT=8080
      - BRAVE_GOGGLES=https://gist.githubusercontent.com/RonsDad/669383264435c45be4a76da5158a5d05/raw
    ports:
      - "8080:8080"  # Host:Container
    networks:
      - brave_network

networks:
  brave_network:
    driver: bridge
