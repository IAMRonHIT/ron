<!DOCTYPE html>
<html>
<head>
    <title>Test Frontend Events</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        .event { margin: 10px 0; padding: 10px; border: 1px solid #444; background: #2a2a2a; }
        .thinking { background: #2a2a4a; border-color: #4a4aaa; }
        .tool_call { background: #3a3a2a; border-color: #aaaa4a; }
        .tool_result { background: #2a3a2a; border-color: #4aaa4a; }
        .assistant_message { background: #3a2a3a; border-color: #aa4aaa; }
    </style>
</head>
<body>
    <h1>Testing Frontend Event Stream</h1>
    <div id="events"></div>
    
    <script>
        async function testBackend() {
            const response = await fetch('http://localhost:8001/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [{ role: 'user', content: 'Search for diabetes symptoms. Think step by step and use tools.' }],
                    enable_thinking: true,
                    stream: true
                })
            });
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data && data !== '[DONE]') {
                            try {
                                const event = JSON.parse(data);
                                displayEvent(event);
                            } catch (e) {
                                console.error('Parse error:', e, data);
                            }
                        }
                    }
                }
            }
        }
        
        function displayEvent(event) {
            const div = document.createElement('div');
            div.className = 'event ' + event.type;
            
            let content = `<strong>${event.type}</strong>: `;
            
            if (event.type === 'content_block_start') {
                content += `Block type: ${event.content_block?.type}, Name: ${event.content_block?.name || 'N/A'}`;
            } else if (event.type === 'content_block_delta') {
                const delta = event.delta;
                if (delta?.type === 'thinking_delta') {
                    content += `Thinking: "${delta.thinking?.slice(0, 100)}..."`;
                } else if (delta?.type === 'text_delta') {
                    content += `Text: "${delta.text?.slice(0, 100)}..."`;
                } else if (delta?.type === 'input_json_delta') {
                    content += `Tool input: ${delta.partial_json?.slice(0, 100)}`;
                }
            } else if (event.type === 'tool_result') {
                content += `Tool: ${event.tool_name}, Result: ${JSON.stringify(event.result).slice(0, 100)}...`;
            } else {
                content += JSON.stringify(event).slice(0, 200);
            }
            
            div.innerHTML = content;
            document.getElementById('events').appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }
        
        testBackend();
    </script>
</body>
</html>
