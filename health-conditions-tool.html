<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn About Health Conditions - Your Health Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        h1 {
            color: #764ba2;
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .search-container {
            margin-bottom: 25px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: white;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .category-btn {
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .category-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .conditions-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 25px;
        }

        .condition-card {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .condition-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .condition-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .condition-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .condition-category {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .condition-summary {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .learn-more {
            color: #667eea;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            margin: 20px auto;
            max-width: 700px;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #e0e0e0;
            transform: rotate(90deg);
        }

        .modal-header {
            margin-bottom: 25px;
        }

        .modal-title {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .info-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .info-section h3 {
            color: #764ba2;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-section p, .info-section ul {
            color: #555;
            font-size: 14px;
            line-height: 1.8;
        }

        .info-section ul {
            padding-left: 20px;
            margin-top: 8px;
        }

        .info-section li {
            margin-bottom: 5px;
        }

        .tips-container {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .tips-header {
            color: #764ba2;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .emoji {
            font-size: 1.2em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 24px;
            }

            .categories {
                grid-template-columns: repeat(2, 1fr);
            }

            .modal-content {
                margin: 10px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span class="emoji">📚</span>
                Learn About Health Conditions
            </h1>
            <p class="subtitle">Easy-to-understand information about common health conditions</p>
        </div>

        <div class="search-container">
            <input 
                type="text" 
                class="search-box" 
                placeholder="Search for a condition (e.g., diabetes, asthma, high blood pressure)"
                id="searchInput"
            >
        </div>

        <div class="categories" id="categories">
            <button class="category-btn active" data-category="all">All Conditions</button>
            <button class="category-btn" data-category="heart">Heart & Blood</button>
            <button class="category-btn" data-category="respiratory">Breathing</button>
            <button class="category-btn" data-category="diabetes">Diabetes</button>
            <button class="category-btn" data-category="mental">Mental Health</button>
            <button class="category-btn" data-category="digestive">Digestive</button>
        </div>

        <div class="conditions-grid" id="conditionsGrid">
            <!-- Conditions will be populated here -->
        </div>
    </div>

    <div class="detail-modal" id="detailModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modalBody">
                <!-- Modal content will be populated here -->
            </div>
        </div>
    </div>

    <script>

                symptoms: [

            {
                id: 9,
                name: "Irritable Bowel Syndrome",
                category: "digestive",
                summary: "A digestive disorder causing stomach pain and bowel problems",
                description: "IBS affects how your intestines work, causing uncomfortable symptoms. It's common and manageable with the right approach.",
                symptoms: [
                    "Stomach pain or cramping",
                    "Bloating and gas",
                    "Diarrhea or constipation",
                    "Mucus in stool",
                    "Feeling like you haven't finished a bowel movement"
                ],

                    "Unknown exact cause",
                    "Stress and anxiety",

                    "Diet changes (low FODMAP)",
                    "Stress management",

                ],
                prevention: [

                    "Exercise regularly",
                    "Eat fiber gradually",
                    "Stay hydrated"
                ]
            },
            {
                id: 10,
                name: "Type 1 Diabetes",
                category: "diabetes",
                summary: "Your body doesn't make insulin to control blood sugar",
                description: "Type 1 diabetes is when your pancreas stops making insulin. Without insulin, sugar builds up in your blood instead of being used for energy.",
                symptoms: [
                    "Extreme thirst",
                    "Frequent urination",
                    "Sudden weight loss",
                    "Extreme hunger",
                    "Fatigue",
                    "Blurred vision",
                    "Mood changes"
                ],
                causes: [
                    "Autoimmune reaction",
                    "Genetic factors",
                    "Unknown environmental triggers",
                    "Not caused by diet or lifestyle"
                ],
                treatment: [
                    "Daily insulin injections or pump",
                    "Blood sugar monitoring",
                    "Carbohydrate counting",
                    "Regular exercise",
                    "Healthy eating plan",

                ],

                    "Early detection important",

                ]

        let currentCategory = 'all';
        let searchTerm = '';

        function init() {
            displayConditions();
            setupEventListeners();
        }

        function setupEventListeners() {
            // Search functionality
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchTerm = e.target.value.toLowerCase();
                displayConditions();
            });

            // Category buttons
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.dataset.category;
                    displayConditions();
                });
            });

            // Close modal when clicking outside
            document.getElementById('detailModal').addEventListener('click', (e) => {
                if (e.target.id === 'detailModal') {
                    closeModal();
                }
            });
        }

        function displayConditions() {
            const grid = document.getElementById('conditionsGrid');
            
            let filtered = conditions.filter(condition => {
                const matchesCategory = currentCategory === 'all' || condition.category === currentCategory;
                const matchesSearch = searchTerm === '' || 
                    condition.name.toLowerCase().includes(searchTerm) ||
                    condition.summary.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <span class="emoji">🔍</span>
                        <p>No conditions found. Try a different search or category.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(condition => `
                <div class="condition-card" onclick="showDetail(${condition.id})">
                    <div class="condition-header">
                        <h3 class="condition-name">${condition.name}</h3>
                        <span class="condition-category">${getCategoryLabel(condition.category)}</span>
                    </div>
                    <p class="condition-summary">${condition.summary}</p>
                    <span class="learn-more">
                        Learn more 
                        <span>→</span>
                    </span>
                </div>
            `).join('');
        }

        function getCategoryLabel(category) {
            const labels = {
                'heart': 'Heart & Blood',
                'respiratory': 'Breathing',
                'diabetes': 'Diabetes',
                'mental': 'Mental Health',
                'digestive': 'Digestive'
            };
            return labels[category] || category;
        }

        function showDetail(id) {
            const condition = conditions.find(c => c.id === id);
            if (!condition) return;

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="modal-header">
                    <h2 class="modal-title">${condition.name}</h2>
                    <span class="condition-category">${getCategoryLabel(condition.category)}</span>
                </div>

                <div class="info-section">
                    <h3><span class="emoji">📖</span> What is it?</h3>
                    <p>${condition.description}</p>
                </div>

                <div class="info-section">
                    <h3><span class="emoji">🔍</span> Common Signs & Symptoms</h3>
                    <ul>
                        ${condition.symptoms.map(s => `<li>${s}</li>`).join('')}
                    </ul>
                </div>

                <div class="info-section">
                    <h3><span class="emoji">❓</span> What Causes It?</h3>
                    <ul>
                        ${condition.causes.map(c => `<li>${c}</li>`).join('')}
                    </ul>
                </div>

                <div class="info-section">
                    <h3><span class="emoji">💊</span> Treatment Options</h3>
                    <ul>
                        ${condition.treatment.map(t => `<li>${t}</li>`).join('')}
                    </ul>
                </div>

                <div class="info-section">
                    <h3><span class="emoji">🛡️</span> Prevention Tips</h3>
                    <ul>
                        ${condition.prevention.map(p => `<li>${p}</li>`).join('')}
                    </ul>
                </div>

                <div class="tips-container">
                    <div class="tips-header">
                        <span class="emoji">💡</span>
                        Important Reminder
                    </div>
                    <p style="color: #666; font-size: 14px;">
                        This information is for educational purposes only. Always consult with your healthcare provider for personalized medical advice, diagnosis, or treatment. If you're experiencing severe symptoms or a medical emergency, call 911 immediately.
                    </p>
                </div>
            `;

            document.getElementById('detailModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
